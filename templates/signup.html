<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | StockLedger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
    --bg:#0d0f14; --bg2:#13161e; --bg3:#1a1e2a;
    --border:#252a38; --border2:#2e3449;
    --text:#e8eaf0; --muted:#7a8199;
    --accent:#f0a500; --accent2:#f7c948;
    --danger:#e05c5c; --success:#3fcb7f;
    --font:'DM Sans',sans-serif;
    --radius:10px; --radius-lg:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body {
    background:var(--bg); color:var(--text); font-family:var(--font);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
    position:relative; overflow:hidden;
}
body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(var(--border) 1px,transparent 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:48px 48px; opacity:.35; pointer-events:none;
}
body::after {
    content:''; position:fixed; top:-20%; left:50%; transform:translateX(-50%);
    width:600px; height:400px;
    background:radial-gradient(ellipse,color-mix(in srgb,var(--success) 6%,transparent) 0%,transparent 70%);
    pointer-events:none;
}
.wrap { position:relative; z-index:1; width:100%; max-width:400px; animation:rise .4s ease both; }
@keyframes rise { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
.brand { text-align:center; margin-bottom:32px; }
.brand-icon { display:inline-flex; align-items:center; justify-content:center; width:48px; height:48px; border-radius:14px; background:var(--bg2); border:1px solid var(--border2); margin-bottom:16px; }
.brand h1 { font-size:22px; font-weight:600; color:var(--accent); letter-spacing:.02em; }
.brand p  { font-size:14px; color:var(--muted); margin-top:4px; font-weight:300; }
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius-lg); padding:32px; }
.card h2 { font-size:18px; font-weight:500; margin-bottom:24px; }
.flashes { margin-bottom:20px; }
.flash { padding:11px 16px; border-radius:var(--radius); font-size:13px; }
.flash.error   { background:color-mix(in srgb,var(--danger) 14%,transparent); border:1px solid color-mix(in srgb,var(--danger) 30%,transparent); color:var(--danger); }
.flash.success { background:color-mix(in srgb,var(--success) 14%,transparent); border:1px solid color-mix(in srgb,var(--success) 30%,transparent); color:var(--success); }
.form-group { margin-bottom:18px; }
label { display:block; font-size:12px; font-weight:500; color:var(--muted); margin-bottom:7px; letter-spacing:.04em; text-transform:uppercase; }
input[type=text], input[type=password] {
    width:100%; padding:11px 14px; background:var(--bg3); border:1px solid var(--border2);
    border-radius:var(--radius); color:var(--text); font-family:var(--font); font-size:14px;
    transition:border-color .18s, box-shadow .18s;
}
input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 18%,transparent); }
input::placeholder { color:var(--muted); }
.hint { font-size:12px; color:var(--muted); margin-top:7px; }
.btn-submit {
    width:100%; padding:12px; background:var(--accent); color:#0d0f14;
    border:none; border-radius:var(--radius); font-family:var(--font); font-size:15px; font-weight:600;
    cursor:pointer; transition:all .18s; margin-top:6px;
}
.btn-submit:hover { background:var(--accent2); transform:translateY(-1px); }
.foot-link { text-align:center; margin-top:20px; font-size:14px; color:var(--muted); }
.foot-link a { color:var(--accent); text-decoration:none; font-weight:500; }
.foot-link a:hover { color:var(--accent2); }
</style>
</head>
<body>
<div class="wrap">
    <div class="brand">
        <div class="brand-icon">
            <svg width="24" height="24" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="2" fill="#f0a500"/><rect x="11" y="2" width="7" height="7" rx="2" fill="#f0a500" opacity=".5"/><rect x="2" y="11" width="7" height="7" rx="2" fill="#f0a500" opacity=".5"/><rect x="11" y="11" width="7" height="7" rx="2" fill="#f0a500" opacity=".25"/></svg>
        </div>
        <h1>StockLedger</h1>
        <p>Create your account</p>
    </div>

    <div class="card">
        <h2>Get started</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flashes">
              {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required>
                <p class="hint">At least 8 characters recommended</p>
            </div>
            <button type="submit" class="btn-submit">Create Account</button>
        </form>
    </div>

    <div class="foot-link">
        Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
</div>
</body>
</html>
